name: 🤖 Claude Auto Review

on:
  pull_request:
    types: [opened]
  workflow_dispatch:

permissions: {}

jobs:
  auto-review:
    permissions:
      contents: read         # To read repository code
      id-token: write        # For OIDC authentication to Socket.dev
      pull-requests: read    # To read PR details
    uses: SocketDev/socket-registry/.github/workflows/claude-auto-review.yml@4709a2443e5a036bb0cd94e5d1559f138f05994c # main
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
