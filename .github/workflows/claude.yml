name: 🤖 Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:

permissions: {}

jobs:
  claude:
    permissions:
      contents: read         # To read repository code
      id-token: write        # For OIDC authentication to Socket.dev
      issues: write          # To comment on issues
      pull-requests: write   # To create/update PRs
    uses: SocketDev/socket-registry/.github/workflows/claude.yml@67a3db92603c23c58031586611c7cc852244c87c # main
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
