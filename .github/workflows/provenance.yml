name: 📦 Publish

on:
  workflow_dispatch:
    inputs:
      dist-tag:
        description: 'npm dist-tag (latest, next, beta, canary, backport, etc.)'
        required: false
        default: 'latest'
        type: string
      debug:
        description: 'Enable debug output'
        required: false
        default: '0'
        type: string
        options:
          - '0'
          - '1'

permissions: {}

# Serialize publishes per dist-tag. Two concurrent dispatches with the
# same tag would race on `npm publish` (one wins, the other 409s after
# the GitHub release is already cut). Don't cancel an in-flight publish
# — wait for it to finish so the second dispatch can decide whether the
# version it wanted is still needed.
concurrency:
  group: publish-${{ inputs.dist-tag }}
  cancel-in-progress: false


jobs:
  publish:
    permissions:
      contents: write # To create GitHub releases
      id-token: write # For npm trusted publishing via OIDC
    uses: SocketDev/socket-registry/.github/workflows/provenance.yml@5b672d3b8459e61bdd423c058a2e155f92f79389 # main
    with:
      debug: ${{ inputs.debug }}
      dist-tag: ${{ inputs.dist-tag }}
      package-name: '@socketsecurity/sdk'
      publish-script: 'publish:ci'
      setup-script: 'ci:validate'
      use-trusted-publishing: true
    secrets:
      SOCKET_API_TOKEN: ${{ secrets.SOCKET_API_TOKEN }}
