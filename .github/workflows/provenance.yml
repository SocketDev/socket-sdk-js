name: 📦 Publish

on:
  workflow_dispatch:
    inputs:
      dist-tag:
        description: 'npm dist-tag (latest, next, beta, canary, backport, etc.)'
        required: false
        default: 'latest'
        type: string
      debug:
        description: 'Enable debug output'
        required: false
        default: '0'
        type: string
        options:
          - '0'
          - '1'

permissions: {}


jobs:
  publish:
    permissions:
      contents: write # To create GitHub releases
      id-token: write # For npm trusted publishing via OIDC
    uses: SocketDev/socket-registry/.github/workflows/provenance.yml@dd7ea0c4fe523792f75c4002b20e2e5c2e14c066 # main
    with:
      debug: ${{ inputs.debug }}
      dist-tag: ${{ inputs.dist-tag }}
      package-name: '@socketsecurity/sdk'
      publish-script: 'publish:ci'
      setup-script: 'ci:validate'
      use-trusted-publishing: true
