# `_local` wrapper — each repo's own manual get-green entry point. References
# the local delegator (get-green.yml) via a `./` path ref (no @sha) —
# exercising the same delegator → gh-aw .lock.yml path that weekly-update's
# dispatch-workflow drives. workflow_dispatch only: get-green runs on demand
# (a failing update branch), never on a schedule. Cascaded byte-identical
# fleet-wide.

name: 🟢 Get Green

# Manual get-green dispatch. Delegates to ./.github/workflows/get-green.yml,
# which in turn delegates to the gh-aw-compiled get-green.lock.yml.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'The update branch with the failing changes to fix'
        required: true
        type: string
      build-log:
        description: 'Last 100 lines of the failing build output'
        required: false
        type: string
        default: ''
      test-log:
        description: 'Last 100 lines of the failing test output'
        required: false
        type: string
        default: ''

# The gh-aw impl runs the agent + opens the PR via safe-outputs. A reusable
# workflow's token cannot exceed the caller's, so grant the write union here.
permissions:
  contents: write
  pull-requests: write

jobs:
  get-green:
    uses: ./.github/workflows/get-green.yml
    with:
      branch: ${{ inputs.branch }}
      build-log: ${{ inputs.build-log }}
      test-log: ${{ inputs.test-log }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SOCKET_API_TOKEN: ${{ secrets.SOCKET_API_TOKEN }}
