# Layer 4 — `_local` wrapper. NOT reused externally; this is socket-registry's
# own get-green entry point. References Layer 3 (get-green.yml, the thin
# delegator) which it pins to the PROPAGATION SHA on cascade — exercising the
# same delegator → gh-aw .lock.yml path that weekly-update's dispatch-workflow
# drives. workflow_dispatch only: get-green runs on demand (a failing update
# branch), never on a schedule.

name: 🟢 Get Green

# Local (socket-registry) get-green workflow. Delegates to the shared reusable at
# ./.github/workflows/get-green.yml, which in turn
# delegates to the gh-aw-compiled get-green.lock.yml.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'The update branch with the failing changes to fix'
        required: true
        type: string
      build-log:
        description: 'Last 100 lines of the failing build output'
        required: false
        type: string
        default: ''
      test-log:
        description: 'Last 100 lines of the failing test output'
        required: false
        type: string
        default: ''

# The gh-aw impl runs the agent + opens the PR via safe-outputs. A reusable
# workflow's token cannot exceed the caller's, so grant the write union here.
permissions:
  contents: write
  pull-requests: write

jobs:
  get-green:
    uses: ./.github/workflows/get-green.yml
    with:
      branch: ${{ inputs.branch }}
      build-log: ${{ inputs.build-log }}
      test-log: ${{ inputs.test-log }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SOCKET_API_TOKEN: ${{ secrets.SOCKET_API_TOKEN }}
