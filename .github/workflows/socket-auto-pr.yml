name: ⚡ Fix PR

on:
  schedule:
    - cron: '0 0 * * *'   # Run daily at midnight UTC
    - cron: '0 12 * * *'  # Run daily at noon UTC
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug output'
        required: false
        default: false
        type: boolean

permissions: {}

jobs:
  socket-auto-pr:
    permissions:
      contents: write       # To push commits to branches
      pull-requests: write  # To create/update PRs
    uses: SocketDev/socket-registry/.github/workflows/socket-auto-pr.yml@8504f327a7ad48c3a99f41d1fad01effbdecb897 # main
    with:
      debug: ${{ inputs.debug }}
      autopilot: true
    secrets:
      socket_cli_api_token: ${{ secrets.SOCKET_CLI_API_TOKEN }}
      gh_token: ${{ secrets.GITHUB_TOKEN }}
