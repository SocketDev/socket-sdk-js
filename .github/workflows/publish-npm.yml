# Layer 3 — reusable workflow. References Layer 2b (setup-and-install).
# When this file bumps, the merge SHA becomes the PROPAGATION SHA:
# Layer 4 (`_local-not-for-reuse-publish-npm.yml`) pins to it, and
# external repos pin their `uses: ...publish-npm.yml@<sha>` refs to it.

name: 📦 Publish to npm

# Dependencies:
#   - ./.github/actions/setup-and-install

on:
  workflow_call:
    inputs:
      access-script:
        description: 'Package access control script - either a pnpm script name (e.g., "package-npm-access") or a command'
        required: false
        type: string
        default: ''
      create-missing-tag:
        description: 'After a successful publish, create v<version> git tag pointing at the published commit if one does not already exist. Refuses to move an existing tag — see GitHub Release Immutability.'
        required: false
        type: boolean
        default: true
      debug:
        description: 'Enable debug output'
        required: false
        type: string
        default: '0'
      environment:
        description: "GitHub environment to bind the publish job to. Set this to disambiguate the OIDC subject when publishing through this reusable workflow — npm trusted-publisher validation on the workflow_call path checks the calling workflow plus the environment claim. Configure the matching environment name on the package's npm trusted publisher. Empty = no environment binding (back-compat)."
        required: false
        type: string
        default: ''
      dist-tag:
        description: 'Dist-tag for publishing (e.g., "latest", "next", "beta", "canary", "backport")'
        required: false
        type: string
        default: 'latest'
      dry-run:
        description: 'Dry run (default: true)'
        required: false
        type: boolean
        default: true
      force-publish:
        description: 'Force publish without commit checks'
        required: false
        type: boolean
        default: false
      force-registry:
        description: 'Force publish @socketsecurity/registry regardless of version changes'
        required: false
        type: boolean
        default: false
      skip-npm-packages:
        description: 'Skip publishing npm override packages (packages/*)'
        required: false
        type: boolean
        default: false
      node-version:
        description: 'Node version to use'
        required: false
        type: string
        default: '26.3.0'
      package-name:
        description: 'Package name (e.g., "@socketregistry/sdk") - used when scripts are not provided'
        required: false
        type: string
        default: ''
      publish-script:
        description: 'Publishing script - either a pnpm script name (e.g., "publish:ci") or a command (e.g., "npm publish --access public")'
        required: false
        type: string
        default: ''
      ref:
        description: 'Git ref (branch, tag, or commit SHA) to checkout'
        required: false
        type: string
        default: ''
      registry-url:
        description: 'npm registry URL'
        required: false
        type: string
        default: 'https://registry.npmjs.org'
      scope:
        description: 'npm registry scope for package authentication'
        required: false
        type: string
        default: ''
      setup-script:
        description: 'Setup script before publishing - either a pnpm script name (e.g., "ci:validate") or a command (e.g., "pnpm run build")'
        required: false
        type: string
        default: ''
      timeout-minutes:
        description: 'Timeout in minutes'
        required: false
        type: number
        default: 10
      use-trusted-publishing:
        description: 'Use npm trusted publishing with OIDC instead of npm token'
        required: false
        type: boolean
        default: true
      commit-lockfile:
        description: 'Commit pnpm-lock.yaml back to the branch when pnpm install updates it (e.g. after a version bump that changes resolution). Uses the GitHub git objects API so the commit is verified without needing a GPG key. Set false only when the lockfile is guaranteed up-to-date.'
        required: false
        type: boolean
        default: true
    secrets:
      SOCKET_API_TOKEN:
        description: 'Socket API token — when provided, uses sfw-enterprise instead of sfw-free'
        required: false
      SOCKET_API_KEY:
        description: 'DEPRECATED alias of SOCKET_API_TOKEN. Pass `SOCKET_API_TOKEN:` instead. Tracked for one cycle so existing callers keep working.'
        required: false

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: false # Don't cancel publishing

jobs:
  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    # Bind to a GitHub environment when the caller supplies one. The OIDC
    # token then carries an `environment` claim, which npm's
    # trusted-publisher validation uses to disambiguate the workflow_call
    # path (where validation otherwise sees the calling workflow's name and
    # can mismatch). Empty string = unbound (back-compat).
    environment: ${{ inputs.environment }}
    permissions:
      # Needed to create release tags and commits.
      contents: write
      # Needed for npm provenance via OIDC trusted publishing.
      id-token: write
    outputs:
      # Commit SHA the publish ran against. Captured *after* publish succeeds
      # so re-runs that fail before publish leave outputs empty and the
      # verify-and-tag job no-ops. Consumed by the verify-and-tag job.
      published_sha: ${{ steps.capture_sha.outputs.published_sha }}
      published_version: ${{ steps.capture_sha.outputs.published_version }}
    steps:
      - name: Validate inputs
        env:
          PUBLISH_SCRIPT: ${{ inputs.publish-script }}
          PACKAGE_NAME: ${{ inputs.package-name }}
        run: |
          if [ -z "$PUBLISH_SCRIPT" ] && [ -z "$PACKAGE_NAME" ]; then
            echo "Error: package-name is required when publish-script is not provided"
            exit 1
          fi

      - uses: ./.github/actions/setup-and-install
        with:
          checkout-ref: ${{ inputs.ref }}
          node-version: ${{ inputs.node-version }}
          debug: ${{ inputs.debug }}
          scope: ${{ inputs.scope }}
          registry-url: ${{ inputs.registry-url }}
          socket-api-token: ${{ secrets.SOCKET_API_TOKEN || secrets.SOCKET_API_KEY }}

      # Commit pnpm-lock.yaml back to the branch when pnpm install drifts it.
      # Uses the GitHub git objects API (blob → tree → commit → ref PATCH) so
      # the commit is GitHub-web-flow-verified without requiring a GPG key.
      # Skipped when the lockfile is clean (no drift) or commit-lockfile=false.
      - name: Commit lockfile if updated
        if: inputs.commit-lockfile
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          CHECKOUT_REF: ${{ inputs.ref }}
        run: |
          if git diff --quiet pnpm-lock.yaml; then
            echo "pnpm-lock.yaml is clean — nothing to commit"
            exit 0
          fi
          echo "pnpm-lock.yaml updated by pnpm install — committing via GitHub API"
          # Resolve the branch name: prefer the checkout-ref input when it names
          # a branch; fall back to the symbolic HEAD ref (works when ref is empty
          # and actions/checkout checked out the default branch non-detached).
          BRANCH="$(git rev-parse --abbrev-ref HEAD)"
          if [ "$BRANCH" = "HEAD" ] && [ -n "$CHECKOUT_REF" ]; then
            BRANCH="$CHECKOUT_REF"
          fi
          if [ -z "$BRANCH" ] || [ "$BRANCH" = "HEAD" ]; then
            echo "::warning::Cannot determine branch name — skipping lockfile commit"
            exit 0
          fi
          PARENT_SHA="$(git rev-parse HEAD)"
          TREE_SHA="$(git rev-parse 'HEAD^{tree}')"
          CONTENT="$(node -e "const fs=require('node:fs');process.stdout.write(fs.readFileSync('pnpm-lock.yaml').toString('base64'))")"
          BLOB_SHA="$(gh api "repos/$REPO/git/blobs" \
            -f encoding=base64 \
            -f content="$CONTENT" \
            --jq .sha)"
          NEW_TREE_SHA="$(gh api "repos/$REPO/git/trees" \
            -f base_tree="$TREE_SHA" \
            -F 'tree=[{"path":"pnpm-lock.yaml","mode":"100644","type":"blob","sha":"'"$BLOB_SHA"'"}]' \
            --jq .sha)"
          NEW_COMMIT_SHA="$(gh api "repos/$REPO/git/commits" \
            -f message="chore: update pnpm-lock.yaml" \
            -f tree="$NEW_TREE_SHA" \
            -F parents='["'"$PARENT_SHA"'"]' \
            --jq .sha)"
          gh api "repos/$REPO/git/refs/heads/$BRANCH" \
            -X PATCH \
            -f sha="$NEW_COMMIT_SHA"
          git fetch origin "$BRANCH"
          git reset --hard "$NEW_COMMIT_SHA"
          echo "Committed lockfile update at $NEW_COMMIT_SHA on $BRANCH"

      - name: Verify sfw is installed
        run: |
          if [ -z "$SFW_BIN" ] || [ ! -x "$SFW_BIN" ]; then
            echo "Error: sfw is not installed — run the setup-and-install action first" >&2
            exit 1
          fi

      - name: Run setup script
        if: inputs.setup-script != ''
        env:
          SETUP_SCRIPT: ${{ inputs.setup-script }}
        run: |
          # Trim whitespace
          SETUP_SCRIPT=$(echo "$SETUP_SCRIPT" | xargs)

          # Detect if it contains spaces or shell operators (command) vs script name
          if [[ "$SETUP_SCRIPT" =~ ( |&&|\|\||;|\|) ]]; then
            # Contains space or shell operators - run as command
            $SETUP_SCRIPT
          else
            # Script name only - run as pnpm script
            pnpm run $SETUP_SCRIPT
          fi

      - name: Publish with custom script
        if: inputs.publish-script != ''
        env:
          DIST_TAG: ${{ inputs.dist-tag }}
          DRY_RUN: ${{ inputs.dry-run }}
          PUBLISH_SCRIPT: ${{ inputs.publish-script }}
          FORCE_PUBLISH: ${{ inputs.force-publish }}
          FORCE_REGISTRY: ${{ inputs.force-registry }}
          SKIP_NPM_PACKAGES: ${{ inputs.skip-npm-packages }}
        run: |
          # Trim whitespace
          PUBLISH_SCRIPT=$(echo "$PUBLISH_SCRIPT" | xargs)

          FLAGS=""
          if [ "$FORCE_PUBLISH" = "true" ]; then
            FLAGS="$FLAGS --force-publish"
          fi
          if [ "$FORCE_REGISTRY" = "true" ]; then
            FLAGS="$FLAGS --force-registry"
          fi
          if [ "$SKIP_NPM_PACKAGES" = "true" ]; then
            FLAGS="$FLAGS --skip-npm-packages"
          fi
          if [ "$DRY_RUN" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi

          # Detect if it contains spaces or shell operators (command) vs script name
          if [[ "$PUBLISH_SCRIPT" =~ ( |&&|\|\||;|\|) ]]; then
            # Contains space or shell operators - run as command. The
            # caller's command is responsible for honoring the FLAGS;
            # we still export DRY_RUN so command-form scripts can
            # branch on it directly.
            $PUBLISH_SCRIPT
          else
            # Script name only - run as pnpm script
            if [ -n "$FLAGS" ]; then
              pnpm run $PUBLISH_SCRIPT -- $FLAGS
            else
              pnpm run $PUBLISH_SCRIPT
            fi
          fi

      - name: Publish package
        if: inputs.publish-script == '' && inputs.package-name != ''
        env:
          NPM_CONFIG_IGNORE_SCRIPTS: true
          DIST_TAG: ${{ inputs.dist-tag }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          # Default to the canonical fleet publish runner
          # (scripts/publish.mts), which wraps `pnpm stage publish` with
          # an already-published check, error pointers, and dry-run
          # plumbing. The script is cascaded to every fleet repo via
          # socket-wheelhouse's sync-scaffolding manifest, so it's
          # available without each consumer wiring its own publish-script.
          # Fallback to inline `pnpm stage publish` if the script isn't
          # present (older repos that haven't cascaded yet).
          if [ -f scripts/publish.mts ]; then
            EXTRA=""
            if [ "$DRY_RUN" = "true" ]; then EXTRA="--dry-run"; fi
            node scripts/publish.mts --staged --tag "$DIST_TAG" $EXTRA
          else
            if [ "$DRY_RUN" = "true" ]; then
              pnpm stage publish --provenance --access public --tag $DIST_TAG --dry-run
            else
              pnpm stage publish --provenance --access public --tag $DIST_TAG
            fi
          fi

      # Capture the commit SHA that the publish ran against. Reads package.json
      # for the version since both publish paths (custom-script + default
      # `npm publish`) leave it as the authoritative version source. Only
      # records outputs on non-dry-run so the verify-and-tag job no-ops on
      # dry runs.
      - name: Capture published SHA
        id: capture_sha
        if: inputs.dry-run == false
        env:
          PACKAGE_NAME: ${{ inputs.package-name }}
        run: |
          PUBLISHED_SHA=$(git rev-parse HEAD)
          # Best-effort version read. Prefer package-name input's directory if it
          # maps to a sub-package; otherwise root package.json.
          if [ -f package.json ]; then
            VERSION=$(node -p "require('./package.json').version" 2>/dev/null || echo "")
          else
            VERSION=""
          fi
          if [ -z "$VERSION" ]; then
            echo "::warning::Could not read version from package.json; skipping tag capture"
            exit 0
          fi
          echo "published_sha=$PUBLISHED_SHA" >> "$GITHUB_OUTPUT"
          echo "published_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Captured published SHA: $PUBLISHED_SHA"
          echo "Captured published version: $VERSION"

      - name: Set package access
        if: inputs.access-script != ''
        env:
          ACCESS_SCRIPT: ${{ inputs.access-script }}
        run: |
          # Trim whitespace
          ACCESS_SCRIPT=$(echo "$ACCESS_SCRIPT" | xargs)

          # Detect if it contains spaces or shell operators (command) vs script name
          if [[ "$ACCESS_SCRIPT" =~ ( |&&|\|\||;|\|) ]]; then
            # Contains space or shell operators - run as command
            $ACCESS_SCRIPT
          else
            # Script name only - run as pnpm script
            pnpm run $ACCESS_SCRIPT
          fi

      - name: Set MFA automation
        if: inputs.access-script == '' && inputs.package-name != ''
        run: |
          echo "Skipping MFA automation - npm access commands require npm_token authentication"
          echo "Trusted publishing uses OIDC tokens which don't support npm access commands"
          echo "MFA settings should be configured through npm web interface for trusted publishing"

  # Create v<version> git tag at the published commit SHA after a successful
  # publish, idempotently. GitHub Release Immutability ("Disallow assets and
  # tags from being modified once a release is published") freezes tags once
  # bound to a Release, so:
  #   - existing tag at same SHA → no-op
  #   - existing tag at different SHA → hard-fail (operator recovery required)
  # See .claude/plans/tag-after-publish.md for the full design.
  verify-and-tag:
    name: Verify and tag release
    needs: build-and-publish
    if: inputs.create-missing-tag && inputs.dry-run == false && needs.build-and-publish.outputs.published_sha != ''
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      # Needed to push the tag.
      contents: write
    steps:
      # Uses gh api (not `git push`) so GITHUB_TOKEN only lives in this
      # step's env, never written to `.git/config`. No checkout needed —
      # tag creation goes straight against the published SHA via API.
      - name: Tag release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PUBLISHED_SHA: ${{ needs.build-and-publish.outputs.published_sha }}
          PUBLISHED_VERSION: ${{ needs.build-and-publish.outputs.published_version }}
        run: |
          TAG="v$PUBLISHED_VERSION"

          # Look up any existing tag via the API. 200 → exists; 404 → absent.
          EXISTING_JSON=$(gh api "repos/$REPO/git/ref/tags/$TAG" 2>/dev/null || echo "")
          if [ -n "$EXISTING_JSON" ]; then
            EXISTING_SHA=$(echo "$EXISTING_JSON" | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).object.sha")
            if [ "$EXISTING_SHA" = "$PUBLISHED_SHA" ]; then
              echo "Tag $TAG already exists at $PUBLISHED_SHA — no-op."
              exit 0
            fi
            echo "::error::Tag $TAG exists at $EXISTING_SHA but publish SHA is $PUBLISHED_SHA."
            echo "::error::Release immutability is enabled; this requires manual recovery:"
            echo "::error::  1. Delete any GitHub Release tied to $TAG"
            echo "::error::  2. Delete the tag via the API"
            echo "::error::  3. Re-run this workflow"
            exit 1
          fi

          gh api "repos/$REPO/git/refs" \
            -X POST \
            -f "ref=refs/tags/$TAG" \
            -f "sha=$PUBLISHED_SHA"
          echo "Created tag $TAG at $PUBLISHED_SHA"
