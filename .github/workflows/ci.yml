name: ⚡ CI

# Dependencies:
#   - SocketDev/socket-registry/.github/workflows/ci.yml

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Run CI Pipeline
    uses: SocketDev/socket-registry/.github/workflows/ci.yml@1dc0e87db45927365e0622ed56a583f97c6cbbab # main
    with:
      fail-fast: false
      lint-script: 'pnpm run lint --all'
      node-versions: '["24.10.0"]'
      os-versions: '["ubuntu-latest", "macos-latest", "windows-latest"]'
      test-script: 'pnpm run test --all --skip-build'
      test-setup-script: 'pnpm run build'
      type-check-script: 'pnpm run type'
      type-check-setup-script: 'pnpm run build'
