name: 🔄 Weekly Update

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  weekly-update:
    uses: SocketDev/socket-registry/.github/workflows/weekly-update.yml@9602cd34a83e7cc93fef6cf83fff5060de3c5ac0 # main
    with:
      test-setup-script: 'pnpm run build'
      test-script: 'pnpm test'
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      BOT_GPG_PRIVATE_KEY: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
      SOCKET_API_KEY: ${{ secrets.SOCKET_API_KEY }}
