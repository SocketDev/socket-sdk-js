name: 🔄 Weekly Update

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  weekly-update:
    uses: SocketDev/socket-registry/.github/workflows/weekly-update.yml@c291a14196d088970c0453e905b40969b11bf193 # main (2026-05-15)
    with:
      test-setup-script: 'pnpm run build'
      test-script: 'pnpm test'
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      BOT_GPG_PRIVATE_KEY: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
      SOCKET_API_TOKEN: ${{ secrets.SOCKET_API_TOKEN || secrets.SOCKET_API_KEY }}
