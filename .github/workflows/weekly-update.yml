name: 🔄 Weekly Update

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  weekly-update:
    uses: SocketDev/socket-registry/.github/workflows/weekly-update.yml@5b87184bd2bdf4c92e3a5f757cb3af4321b56200 # main (2026-06-12)
    with:
      test-setup-script: 'pnpm run build'
      test-script: 'pnpm test'
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      BOT_GPG_PRIVATE_KEY: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
      SOCKET_API_TOKEN: ${{ secrets.SOCKET_API_TOKEN || secrets.SOCKET_API_KEY }}
