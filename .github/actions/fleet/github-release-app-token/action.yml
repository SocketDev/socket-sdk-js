name: Release app token
description: >-
  Mint a short-lived GitHub App installation token for the Socket RELEASE app
  (create releases, push tags). Org-wide when owner is set, so the token reaches
  member repos. Fleet-shared: authored in socket-wheelhouse's socket-registry override,
  cascaded into socket-registry, and consumed fleet-wide via
  `uses: ./.github/actions/fleet/github-release-app-token`.

inputs:
  client-id:
    description: 'Release App Client ID — pass vars.SOCKET_RELEASE_CLIENT_ID.'
    required: true
  private-key:
    description: 'Release App private key — pass secrets.SOCKET_RELEASE_APP_PRIVATE_KEY.'
    required: true
  owner:
    description: 'Org/owner to scope the token to (for cross-repo reach). Empty = the current repo owner.'
    required: false
    default: ''
  repositories:
    description: 'Newline/comma list of repos to scope the token to. Empty = all repos the app can access in owner.'
    required: false
    default: ''

outputs:
  token:
    description: 'The minted installation token (pass as GH_TOKEN / checkout token).'
    value: ${{ steps.app-token.outputs.token }}

runs:
  using: composite
  steps:
    # Socket-owned, dep-0 minter co-located with this action — runs via
    # $GITHUB_ACTION_PATH so it travels when a member consumes the action
    # cross-repo, and as plain .mjs it needs no recent runner Node. Least-
    # privilege: PERMISSIONS is the exact scope this app needs; zizmor doesn't
    # inspect a run-step mint, so app-tokens-are-scoped.mts is the sole gate that
    # PERMISSIONS is present + non-blank.
    - id: app-token
      shell: bash
      env:
        APP_PRIVATE_KEY: ${{ inputs.private-key }}
        CLIENT_ID: ${{ inputs.client-id }}
        OWNER: ${{ inputs.owner || github.repository_owner }}
        PERMISSIONS: '{"contents":"write"}'
        REPOSITORIES: ${{ inputs.repositories }}
      run: node "${{ github.action_path }}/mint-app-installation-token.mjs"
