# Layer 1 — leaf action (no internal SocketDev refs). Consumed by the
# reusable `ci.yml` (Layer 3) as a pre-flight check at the start of
# every job. When this file bumps, cascade is: 2b → 3 → 4 → external
# repos. See updating-workflows skill at .claude/skills/updating-workflows/.

name: 'GitHub Status Check'
description: >
  Probe githubstatus.com/api/v2/components.json and emit warning
  annotations when GitHub Actions, Git Operations, or API Requests are
  degraded or experiencing an incident. The job continues regardless —
  degraded != down — but the warning appears in the run summary so
  operators know to correlate unexpected CI failures with an upstream
  outage rather than blaming their code.

inputs:
  fail-on-incident:
    description: >
      When "true", exit 1 if any monitored component reports an active
      incident (major_outage or partial_outage). Use for release-blocking
      workflows where you'd rather retry clean than risk a partial publish.
    required: false
    default: 'false'

outputs:
  status:
    description: >
      Worst-case status across all monitored components:
      "operational" | "degraded_performance" | "partial_outage" |
      "major_outage" | "unknown" (when the probe itself fails).
    value: ${{ steps.probe.outputs.status }}
  summary:
    description: >
      Human-readable one-liner, e.g.
      "All monitored GitHub components operational" or
      "⚠️  Actions: degraded_performance".
    value: ${{ steps.probe.outputs.summary }}

runs:
  using: 'composite'
  steps:
    - name: Probe githubstatus.com
      id: probe
      shell: bash
      env:
        FAIL_ON_INCIDENT: ${{ inputs.fail-on-incident }}
      run: |
        set -euo pipefail

        # NOTE: no `declare -A` (associative arrays). macOS GitHub runners run
        # this step under /bin/bash 3.2, which lacks them — `declare -A M=([k]=v)`
        # there parses `[k]` as an arithmetic index, evaluating the bare key as
        # an (unbound, under `set -u`) variable and aborting the step. The
        # `case` lookups below are bash-3.2 portable.

        # Component IDs to monitor → human-readable name (empty = not monitored).
        # Stable IDs from the components API; names are output-only.
        monitored_name() {
          case "$1" in
            br0l2tvcx85d) printf '%s' "Actions" ;;
            8l4ygp009s5s) printf '%s' "Git Operations" ;;
            brv1bkgrwx7q) printf '%s' "API Requests" ;;
            *) printf '' ;;
          esac
        }

        # Severity rank (worst → best). Unknown status → 0 (operational).
        severity_rank() {
          case "$1" in
            major_outage) printf '4' ;;
            partial_outage) printf '3' ;;
            degraded_performance) printf '2' ;;
            under_maintenance) printf '1' ;;
            *) printf '0' ;;
          esac
        }

        # Probe with a short timeout so a slow status page doesn't stall CI.
        RESPONSE="$(curl -sf --max-time 8 \
          https://www.githubstatus.com/api/v2/components.json 2>/dev/null || true)"

        if [ -z "$RESPONSE" ]; then
          echo "status=unknown" >> "$GITHUB_OUTPUT"
          echo "summary=⚠️  githubstatus.com unreachable — cannot confirm GitHub health" \
            >> "$GITHUB_OUTPUT"
          echo "::warning title=GitHub Status::githubstatus.com unreachable; CI results may be unreliable"
          exit 0
        fi

        WORST_SEVERITY=0
        WORST_STATUS="operational"
        MESSAGES=""

        while IFS= read -r line; do
          COMPONENT_ID="$(echo "$line" | cut -d'|' -f1)"
          COMPONENT_STATUS="$(echo "$line" | cut -d'|' -f2)"

          NAME="$(monitored_name "$COMPONENT_ID")"
          [ -z "$NAME" ] && continue

          SEV="$(severity_rank "$COMPONENT_STATUS")"
          if [ "$SEV" -gt "$WORST_SEVERITY" ]; then
            WORST_SEVERITY=$SEV
            WORST_STATUS="$COMPONENT_STATUS"
          fi

          if [ "$COMPONENT_STATUS" != "operational" ]; then
            # Accumulate as a space-joined string (no arrays — 3.2 portable).
            if [ -z "$MESSAGES" ]; then
              MESSAGES="$NAME: $COMPONENT_STATUS"
            else
              MESSAGES="$MESSAGES $NAME: $COMPONENT_STATUS"
            fi
          fi
        done < <(echo "$RESPONSE" | python3 -c \
          'import sys,json;[print(c["id"]+"|"+c["status"]) for c in json.load(sys.stdin).get("components",[])]')

        if [ -z "$MESSAGES" ]; then
          SUMMARY="All monitored GitHub components operational"
          echo "status=operational" >> "$GITHUB_OUTPUT"
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "ℹ️  $SUMMARY"
        else
          SUMMARY="⚠️  $MESSAGES"
          echo "status=$WORST_STATUS" >> "$GITHUB_OUTPUT"
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "::warning title=GitHub Status::$SUMMARY — CI failures may be related to upstream degradation"

          if [ "$FAIL_ON_INCIDENT" = "true" ] && \
             [ "$WORST_SEVERITY" -ge "$(severity_rank partial_outage)" ]; then
            echo "::error title=GitHub Status::$SUMMARY — aborting due to fail-on-incident=true"
            exit 1
          fi
        fi
