# Fleet-canonical cargo soak config. A repository that needs target runners,
# rustflags, or other local Cargo settings puts them in `config.repo.toml`.
# Rust-capable repos also receive the fleet's optional Darwin signing runner.
# This split lets the cascade stay byte-identical without deleting legitimate
# repository configuration.
include = [
  { path = "config.darwin-signing.toml", optional = true },
  { path = "config.repo.toml", optional = true },
]

# Owned by
# scripts/fleet/update/cargo.mts (renderMinPublishAgeConfig derives this exact
# body from SOAK_DAYS, scripts/fleet/constants/soak.mts); gated by
# scripts/fleet/check/cargo-soak-config-is-current.mts, which asserts this
# file's values still equal SOAK_DAYS (a data file cannot import the
# constant, so the gate is the parity check). Do not hand-edit the values
# below — bump SOAK_DAYS and re-cascade instead.
#
# Semantics: these `[unstable]` / `[registry]` / `[resolver]` keys are a
# NIGHTLY-only cargo feature (`-Zmin-publish-age`, rust-lang/cargo#15973,
# RFC 3923) and are INERT on the stable toolchain fleet repos build with
# (e.g. ultrathink pins 1.95.0) — stable cargo ignores unknown `[unstable]`
# keys rather than enforcing them. Build-time soak enforcement therefore
# comes from the committed `Cargo.lock`: a build must use the lock, and the
# lock only ever contains versions the nightly updater (below) allowed in.
# Update-time enforcement is the nightly updater
# (scripts/fleet/update/cargo.mts, pinned to RUST_UPDATER_TOOLCHAIN), which
# runs `cargo +<nightly> update -Zmin-publish-age` against this config and
# can only move the lock to versions that clear the soak window. Any nightly
# cargo run by hand in this repo also honors this file natively.

# Enable the unstable feature (equivalent to the -Zmin-publish-age flag).
[unstable]
min-publish-age = true

# Soak threshold: reject any registry version whose publish time is newer
# than this window. Duration is "<int> <unit>"
# (seconds|minutes|hours|days|weeks|months).
# Source: rust-lang/cargo#15973, RFC 3923 (registry.global-min-publish-age).
[registry]
global-min-publish-age = "7 days"

# Make the age a HARD gate: the resolver ignores too-new versions unless
# they are already pinned in Cargo.lock.
# Source: RFC 3923 (resolver.incompatible-publish-age).
[resolver]
incompatible-publish-age = "deny"
